name: Monthly INMET Refresh

on:
  schedule:
    - cron: "0 12 1-3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-inmet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download INMET yearly ZIP
        run: |
          python - << 'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import urllib.request

          now = datetime.now(timezone.utc)
          year = now.year if now.month > 1 else now.year - 1
          url = f"https://portal.inmet.gov.br/uploads/dadoshistoricos/{year}.zip"

          out_dir = Path("INMET")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_file = out_dir / f"{year}.zip"

          print(f"Downloading: {url}")
          urllib.request.urlretrieve(url, out_file)
          print(f"Saved: {out_file}")
          PY

      - name: Rebuild INMET manifest
        run: |
          python build_inmet_manifest.py --data-dir INMET --output inmet_manifest.json --tz-offset -3

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add INMET/*.zip inmet_manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: monthly INMET refresh"
            git push
          fi
